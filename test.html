<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DealScan Test</title>
<style>
body{font-family:Arial,sans-serif;background:#0a0a0f;color:#f0f0f5;padding:16px;margin:0}
h1{color:#FF5C2B;font-size:18px;margin-bottom:12px}
.box{background:#111118;border:1px solid #333;border-radius:10px;padding:12px;margin-bottom:10px;font-size:13px;line-height:1.6}
.ok{border-color:#00D084;color:#00D084}
.err{border-color:#FF3B30;color:#FF3B30}
.deal{background:#111118;border:1px solid #FF5C2B;border-radius:10px;padding:12px;margin-bottom:8px}
.name{font-weight:700;font-size:14px;margin-bottom:4px}
.price{color:#FF5C2B;font-size:18px;font-weight:800}
.score{color:#00D084;font-size:12px;margin-top:4px}
</style>
</head>
<body>
<h1>🔥 DealScan — Diagnostic</h1>

<div id="log" class="box">⏳ Test en cours...</div>
<div id="deals"></div>

<script>
var API = 'https://julvox-dealscan-backend-production.up.railway.app';
var log = document.getElementById('log');
var deals = document.getElementById('deals');

function addLog(msg, ok) {
  log.innerHTML += '<br>' + msg;
  if (ok !== undefined) log.className = 'box ' + (ok ? 'ok' : 'err');
}

// Test 1: fetch basique
log.innerHTML = '1. Test connexion API...';

fetch(API + '/deals?limit=10')
  .then(function(r) {
    addLog('2. Status HTTP: ' + r.status, r.ok);
    return r.json();
  })
  .then(function(data) {
    var arr = data.deals || [];
    addLog('3. Deals reçus: ' + arr.length, arr.length > 0);

    if (arr.length === 0) {
      addLog('❌ Aucun deal — base de données vide ?', false);
      return;
    }

    addLog('4. Affichage des cards...', true);

    var html = '';
    for (var i = 0; i < arr.length; i++) {
      var d = arr[i];
      html += '<div class="deal">';
      html += '<div class="name">' + (d.name || 'Sans nom') + '</div>';
      html += '<div>' + (d.store || '') + '</div>';
      html += '<div class="price">' + (d.current_price || 0) + '€';
      if (d.original_price) html += ' <span style="font-size:12px;color:#555;text-decoration:line-through">' + d.original_price + '€</span>';
      html += '</div>';
      html += '<div class="score">★ ' + (d.novadeal_score || 0) + '/100 — ' + (d.category || '') + '</div>';
      html += '</div>';
    }
    deals.innerHTML = html;
  })
  .catch(function(e) {
    addLog('❌ Erreur: ' + e.message, false);
    addLog('Vérifier CORS ou que Railway tourne');
  });
</script>
</body>
</html>
